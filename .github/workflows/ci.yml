name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    # The branch ruleset requires a status check with this exact context.
    name: CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pytest
